<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" role="img" aria-label="Wireline — native macOS SSH client with a built-in AI copilot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e0a"/>
      <stop offset="1" stop-color="#0f150f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0" stop-color="#35d07f" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#35d07f" stop-opacity="0"/>
    </radialGradient>
    <style>text{font-family:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace}</style>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1279" height="339" fill="none" stroke="#1b241b"/>

  <!-- window dots -->
  <circle cx="40" cy="40" r="7" fill="#ff5f57"/>
  <circle cx="64" cy="40" r="7" fill="#febc2e"/>
  <circle cx="88" cy="40" r="7" fill="#28c840"/>

  <!-- centered wordmark -->
  <text x="640" y="168" text-anchor="middle" font-size="78" font-weight="700" fill="#c8d3c8">&gt; <tspan fill="#35d07f">wireline</tspan></text>

  <!-- tagline -->
  <text x="640" y="212" text-anchor="middle" font-size="24" fill="#c8d3c8">native macOS SSH client · built-in AI copilot</text>

  <!-- feature line -->
  <text x="640" y="256" text-anchor="middle" font-size="19" fill="#63755f">内置终端 &#183; AI 副驾 &#183; 舰队群跑 &#183; 标准 ~/.ssh/config</text>

  <!-- prompt line -->
  <text x="640" y="298" text-anchor="middle" font-size="18" fill="#35d07f" opacity="0.85">$ ⌘; 说人话 → 生成命令 → 执行</text>
</svg>
